name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: acifani/setup-tinygo@v2
        with:
          tinygo-version: 0.31.2
      - name: Build plugin.wasm
        run: tinygo build -o plugin.wasm -target=wasi -no-debug -opt=2 ./cmd
      - name: Assert binary size ≤ 2 MB
        run: |
          size=$(stat -c%s plugin.wasm)
          echo "plugin.wasm: ${size} bytes"
          if [ "$size" -gt 2097152 ]; then
            echo "::error::binary exceeds 2 MB budget"
            exit 1
          fi
      - uses: sigstore/cosign-installer@v3
      - name: Sign with cosign (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign-blob --yes \
            --output-signature plugin.wasm.sig \
            --output-certificate plugin.wasm.pem \
            plugin.wasm
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            plugin.wasm
            plugin.wasm.sig
            plugin.wasm.pem
            samuel-plugin.toml
