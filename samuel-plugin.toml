name = "go-guide-wasm"
version = "0.1.0"
kind = "wasm"
summary = "TinyGo port of samuel-go-guide; surfaces a `lint` export."
license = "MIT"
homepage = "https://github.com/samuelpkg/samuel-go-guide-wasm"
authors = ["Samuel maintainers"]

[samuel]
framework = "^2.2.0"
protocol = "^1.0.0"

[wasm]
module = "plugin.wasm"
exports = ["lint", "health"]

[runtime]
max_memory  = 64
timeout     = "5s"
hard_timeout = "30s"
exports     = ["lint", "health"]

[capabilities]
filesystem = { read = ["/workspace"], write = [] }
env = []

[capabilities.network]
hosts = []
